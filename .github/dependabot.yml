version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      frontend-minor-patch:
        update-types: ["minor", "patch"]
      frontend-major:
        update-types: ["major"]
  - package-ecosystem: "npm"
    directory: "/mcp-server"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      mcp-all:
        patterns: ["*"]
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      python-all:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      actions-all:
        patterns: ["*"]
